<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Pantry Junction</title>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS5gEyvX1yEbtIbQyXfOfrXGFwfi47Qs74ysA&s">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4a574;
            --gold-light: #e8c49a;
            --gold-dark: #b8945f;
            --dark: #0a0a0a;
            --card: #1a1a1a;
            --card-hover: #2a2a2a;
            --text: #ffffff;
            --text-secondary: #bdbdbd;
            --text-muted: #888888;
            --border: #333333;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --shadow-hover: 0 12px 40px rgba(0,0,0,0.4);
            --gradient: linear-gradient(135deg, #d4a574 0%, #b8945f 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--dark); color: var(--text); min-height: 100vh; line-height: 1.6; }
        header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 50px; position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow); backdrop-filter: blur(10px); }
        .logo { letter-spacing: 3px; font-size: 28px; font-weight: bold; color: var(--gold); text-transform: uppercase; background: linear-gradient(45deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        nav { display: flex; gap: 40px; align-items: center; }
        nav a { text-decoration: none; color: var(--text-secondary); padding: 10px 15px; transition: all 0.3s ease; font-size: 14px; font-weight: 500; text-transform: uppercase; position: relative; }
        nav a:hover, nav a.active { color: var(--gold); }
        nav a::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: var(--gold); transition: all 0.3s ease; transform: translateX(-50%); }
        nav a:hover::after, nav a.active::after { width: 100%; }
        .profile-section { position: relative; display: flex; align-items: center; gap: 10px; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: var(--dark); font-weight: bold; font-size: 18px; cursor: pointer; transition: all 0.3s ease; border: 2px solid transparent; }
        .profile-pic:hover { transform: scale(1.1); border-color: var(--gold); box-shadow: 0 0 20px rgba(212,165,116,0.3); }
        .profile-dropdown { position: absolute; top: 60px; right: 0; background: var(--card); border: 1px solid var(--gold); border-radius: 12px; padding: 20px; min-width: 250px; box-shadow: var(--shadow); display: none; z-index: 1000; }
        .profile-dropdown.show { display: block; }
        .profile-dropdown h3 { color: var(--gold); margin-bottom: 15px; font-size: 18px; }
        .profile-dropdown p { margin: 8px 0; font-size: 14px; color: var(--text-secondary); }
        .profile-dropdown .btn { background: var(--gradient); color: var(--dark); border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; transition: all 0.3s ease; width: 100%; }
        .profile-dropdown .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(212,165,116,0.3); }
        .profile-container { min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .section-header { display: flex; align-items: center; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .section-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(212,165,116,0.1); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 20px; margin-right: 16px; }
        .section-title { font-size: 28px; font-weight: bold; color: var(--text); }
        .content-section { background: var(--card); border-radius: 20px; padding: 50px; border: 1px solid var(--border); width: 100%; max-width: 600px; box-shadow: var(--shadow); }
        .info-grid { display: flex; flex-direction: column; gap: 0; }
        .info-card { background: transparent; border-radius: 0; padding: 0; border: none; transition: none; }
        .info-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .info-label i { color: var(--gold); }
        .info-value { font-size: 16px; color: var(--text); font-weight: 500; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 13px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; background: rgba(212,165,116,0.05); border: 2px solid var(--border); color: var(--text); padding: 14px 16px; border-radius: 10px; font-size: 15px; outline: none; transition: all 0.3s ease; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: var(--text-muted); }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--gold); background: rgba(212,165,116,0.08); box-shadow: 0 0 12px rgba(212,165,116,0.2); }
        .form-group input:disabled { background: rgba(212,165,116,0.02); color: var(--text-muted); cursor: not-allowed; }
        .form-group textarea { resize: vertical; height: 110px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--gradient); color: var(--dark); padding: 15px 32px; border-radius: 10px; font-weight: 600; text-decoration: none; font-size: 14px; transition: all 0.3s ease; border: none; cursor: pointer; width: 100%; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(212,165,116,0.4); }
        .btn-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: transparent; color: var(--gold); padding: 15px 32px; border-radius: 10px; font-weight: 600; text-decoration: none; font-size: 14px; transition: all 0.3s ease; border: 2px solid var(--gold); width: 100%; margin-top: 12px; }
        .btn-secondary:hover { background: var(--gold); color: var(--dark); transform: translateY(-3px); }
        .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--card); color: var(--text); padding: 12px 22px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 9999; pointer-events: none; border-left: 3px solid var(--gold); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        /* Avatar Modal */
        .avatar-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .avatar-modal.show {
            display: flex;
        }

        .avatar-modal-content {
            background: rgba(18,18,18,0.95);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 18px 45px rgba(0,0,0,0.55);
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(16px);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .avatar-modal h2 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 22px;
        }

        .avatar-modal-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .avatar-preview {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--card-hover);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(212,165,116,0.15);
            border: 1px solid rgba(212,165,116,0.2);
            border-radius: 10px;
            color: var(--gold);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .file-btn:hover {
            background: rgba(212,165,116,0.25);
        }

        .file-btn input {
            display: none;
        }

        .avatar-upload-note {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 12px 0;
        }

        .avatar-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .avatar-option {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--card-hover);
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .avatar-option:hover {
            transform: scale(1.1);
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212,165,116,0.4);
        }

        .avatar-option.selected {
            border-color: var(--gold);
            background: rgba(212,165,116,0.2);
        }

        .avatar-modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .avatar-modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-cancel {
            background: var(--card-hover);
            color: var(--text);
        }

        .btn-cancel:hover {
            background: var(--border);
        }

        .btn-confirm {
            background: var(--gold);
            color: var(--dark);
        }

        .btn-confirm:hover {
            background: var(--gold-light);
        }

        /* Back Arrow Button */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--gold);
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            padding: 8px 12px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .back-button:hover {
            color: var(--gold-light);
            transform: translateX(-4px);
        }

        .back-button i {
            font-size: 18px;
        }
        
        @media (max-width: 768px) { 
            .profile-container { padding: 20px 15px; }
            .content-section { padding: 35px 25px; max-width: 100%; }
            .section-title { font-size: 24px; }
            header { padding: 15px 25px; }
            nav { gap: 20px; display: none; }
        }
        @media (max-width: 480px) {
            .content-section { padding: 25px 20px; }
            .section-title { font-size: 20px; }
            .section-icon { width: 40px; height: 40px; font-size: 18px; }
            header { padding: 12px 15px; }
            .logo { font-size: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">PJ-Restaurant</div>
        <nav id="desktopNav">
            <a href="index.html">Home</a>
            <a href="order.html">Order</a>
            <a href="table_booking.html">Table Booking</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <div class="profile-section">
                <div class="profile-pic" id="profilePic" onclick="openAvatarModal(); event.stopPropagation();" title="Click to change profile photo">&#128100;</div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div id="loggedOutContent">
                        <h3>Welcome!</h3>
                        <p>Please login to access your profile</p>
                        <button class="btn" onclick="window.location.href='login.html'">Login</button>
                        <button class="btn" onclick="window.location.href='signup.html'">Sign Up</button>
                    </div>
                    <div id="loggedInContent" style="display:none;">
                        <h3 id="userName">User</h3>
                        <p id="userEmail">user@example.com</p>
                        <p id="userPhone">Phone: Not provided</p>
                        <button class="btn" onclick="window.location.href='profile.html'">View Profile</button>
                        <button class="btn" onclick="logout()">Logout</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="profile-container">
        <button class="back-button" onclick="window.location.href='profile.html'">
            <i class="fas fa-arrow-left"></i> Back to Profile
        </button>

        <div class="content-section">
            <div class="section-header">
                <div class="section-icon"><i class="fas fa-user-cog"></i></div>
                <h2 class="section-title">Edit Profile</h2>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editName" placeholder="Your full name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="editEmail" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="editPhone" placeholder="+91 XXXXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <textarea id="editAddress" placeholder="Your delivery address" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Member Since</label>
                        <input type="text" id="editMemberSince" disabled>
                    </div>
                    <button class="btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> Save Changes</button>
                    <button class="btn-secondary" onclick="window.location.href='profile.html'"><i class="fas fa-arrow-left"></i> Back to Profile</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Avatar Selection Modal -->
    <div class="avatar-modal" id="avatarModal">
        <div class="avatar-modal-content">
            <h2>Change Profile Photo</h2>
            <div class="avatar-modal-top">
                <div class="avatar-preview" id="modalAvatarPreview">👤</div>
                <label class="file-btn" for="avatarUploadInput">
                    📷 Change Photo
                    <input type="file" id="avatarUploadInput" accept="image/*">
                </label>
            </div>
            <div class="avatar-upload-note">Or pick one of the quick avatars below</div>
            <div class="avatar-options" id="avatarOptions"></div>
            <div class="avatar-modal-buttons">
                <button class="btn-cancel" onclick="closeAvatarModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmAvatar()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Avatar functions
        const avatarOptions = ['👤', '😊', '😃', '😎', '🧑', '👨', '👩', '🧔', '👶', '🤖', '🐱', '🐶', '🦁', '🐯', '🦊', '🐻', '⭐', '🌟', '🎭', '🎪'];
        let selectedAvatar = null;

        function getStoredAvatar() {
            const user = JSON.parse(localStorage.getItem('currentUser')) || {};
            return user.avatarImage || user.avatarEmoji || localStorage.getItem('userAvatarImage') || localStorage.getItem('userAvatar');
        }

        function setAvatarElement(el, avatarValue) {
            if (!el) return;
            const isImage = typeof avatarValue === 'string' && avatarValue.startsWith('data:image');
            if (isImage) {
                el.innerHTML = `<img src="${avatarValue}" alt="Profile avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
            } else {
                el.textContent = avatarValue || '👤';
            }
        }

        function openAvatarModal() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                alert('Please login to change your avatar');
                return;
            }

            const savedAvatar = getStoredAvatar() || '👤';
            selectedAvatar = savedAvatar;

            const modalContent = document.getElementById('avatarOptions');
            modalContent.innerHTML = avatarOptions.map(avatar => `
                <div class="avatar-option ${avatar === savedAvatar ? 'selected' : ''}" onclick="selectAvatar('${avatar}', event)">${avatar}</div>
            `).join('');

            const preview = document.getElementById('modalAvatarPreview');
            setAvatarElement(preview, savedAvatar);

            const fileInput = document.getElementById('avatarUploadInput');
            if (fileInput) {
                fileInput.value = '';
                fileInput.onchange = (event) => {
                    handleAvatarUpload(event);
                    setAvatarElement(preview, selectedAvatar);
                };
            }

            document.getElementById('avatarModal').classList.add('show');
        }

        function handleAvatarUpload(event) {
            const file = event.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                selectedAvatar = reader.result;
                document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
            };
            reader.readAsDataURL(file);
        }

        function selectAvatar(avatar, evt) {
            selectedAvatar = avatar;
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
            if (evt && evt.currentTarget) evt.currentTarget.classList.add('selected');
        }

        function closeAvatarModal() {
            document.getElementById('avatarModal').classList.remove('show');
        }

        function confirmAvatar() {
            if (!selectedAvatar) return;

            const user = JSON.parse(localStorage.getItem('currentUser')) || {};

            if (typeof selectedAvatar === 'string' && selectedAvatar.startsWith('data:image')) {
                localStorage.setItem('userAvatarImage', selectedAvatar);
                localStorage.removeItem('userAvatar');
                user.avatarImage = selectedAvatar;
                delete user.avatarEmoji;
            } else {
                localStorage.setItem('userAvatar', selectedAvatar);
                localStorage.removeItem('userAvatarImage');
                user.avatarEmoji = selectedAvatar;
                delete user.avatarImage;
            }

            localStorage.setItem('currentUser', JSON.stringify(user));
            setAvatarElement(document.getElementById('profilePic'), selectedAvatar);
            setAvatarElement(document.getElementById('modalAvatarPreview'), selectedAvatar);
            closeAvatarModal();
            showToast('Avatar updated successfully!');
        }

        // Toast function
        function showToast(msg, duration = 2500) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        function loadProfileForm() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('editName').value = user.name || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPhone').value = user.phone || '';
            document.getElementById('editAddress').value = user.address || '';
            document.getElementById('editMemberSince').value = user.memberSince ? new Date(user.memberSince).toLocaleDateString() : 'N/A';

            // Update header profile info
            const avatarValue = getStoredAvatar() || (user.name || user.email || '👤').charAt(0).toUpperCase();
            const profilePic = document.getElementById('profilePic');
            setAvatarElement(profilePic, avatarValue);
            
            document.getElementById('userName').textContent = user.name || 'User';
            document.getElementById('userEmail').textContent = user.email || 'user@example.com';
            document.getElementById('userPhone').textContent = user.phone ? 'Phone: ' + user.phone : 'Phone: Not provided';
        }

        function saveProfile() {
            const name = document.getElementById('editName').value.trim();
            const email = document.getElementById('editEmail').value.trim().toLowerCase();
            const phone = document.getElementById('editPhone').value.trim();
            const address = document.getElementById('editAddress').value.trim();

            if (!name || !email) {
                showToast('Please provide your name and email.');
                return;
            }

            const user = JSON.parse(localStorage.getItem('currentUser')) || {};
            user.name = name;
            user.email = email;
            user.phone = phone;
            user.address = address;

            localStorage.setItem('currentUser', JSON.stringify(user));
            showToast('Profile updated successfully!');

            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1100);
        }

        function toggleProfileDropdown() {
            document.getElementById('profileDropdown').classList.toggle('show');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        // Close avatar modal when clicking outside
        document.addEventListener('click', function(event) {
            const avatarModal = document.getElementById('avatarModal');
            if (event.target === avatarModal) {
                closeAvatarModal();
            }
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function (event) {
            const profileSection = document.querySelector('.profile-section');
            const dropdown = document.getElementById('profileDropdown');
            if (profileSection && !profileSection.contains(event.target)) {
                dropdown.classList.remove('show');
            }
        });

        document.addEventListener('DOMContentLoaded', loadProfileForm);
    </script>
</body>
</html>
